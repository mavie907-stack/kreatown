<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:#0a0806;color:#e8d5b0}
.app{display:flex;height:100vh;width:100%;position:relative;overflow:hidden}
.room-bg{position:absolute;inset:0;z-index:0;background-size:cover;background-position:center;background-repeat:no-repeat;transition:all 0.8s ease}
.room-bg::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,0.42)}
@keyframes particleFloat{0%{transform:translateY(100vh);opacity:0}10%{opacity:0.6}90%{opacity:0.3}100%{transform:translateY(-20px) translateX(30px);opacity:0}}
.particle{position:absolute;border-radius:50%;animation:particleFloat linear infinite;opacity:0;pointer-events:none}
#particles{position:absolute;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.sidebar{position:relative;z-index:10;width:240px;flex-shrink:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(20px);border-right:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;height:100vh}
.sidebar-logo{padding:1.5rem 1.25rem 1rem;border-bottom:1px solid rgba(255,255,255,0.08);font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:#f5d58a}
.sidebar-logo span{color:#f4732a}
.sidebar-back{padding:0.75rem 1.25rem;border-bottom:1px solid rgba(255,255,255,0.06)}
.back-link{font-size:0.75rem;color:rgba(255,255,255,0.35);text-decoration:none;display:flex;align-items:center;gap:0.4rem;transition:color 0.2s}
.back-link:hover{color:rgba(255,255,255,0.65)}
.rooms-label{padding:1rem 1.25rem 0.4rem;font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.3);font-family:'DM Mono',monospace}
.room-item{display:flex;align-items:center;gap:0.75rem;padding:0.7rem 1.25rem;cursor:pointer;border-left:2px solid transparent;transition:all 0.2s;color:rgba(255,255,255,0.5);font-size:0.82rem}
.room-item:hover{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.8)}
.room-item.active{border-left-color:#f4732a;background:rgba(244,115,42,0.1);color:#f5d58a}
.room-item.locked{opacity:0.4;cursor:not-allowed}
.room-icon{font-size:1rem;width:20px;text-align:center;flex-shrink:0}
.room-info{flex:1}
.room-name{font-size:0.82rem}
.room-tier{font-size:0.62rem;color:rgba(255,255,255,0.35);margin-top:0.1rem;font-family:'DM Mono',monospace}
.room-item.active .room-tier{color:rgba(245,213,138,0.6)}
.room-count{font-size:0.65rem;background:rgba(255,255,255,0.1);padding:0.1rem 0.4rem;border-radius:100px;color:rgba(255,255,255,0.4)}
.room-item.active .room-count{background:rgba(244,115,42,0.2);color:#f4732a}
.online-dot{width:6px;height:6px;border-radius:50%;background:#2dab80;flex-shrink:0;box-shadow:0 0 6px rgba(45,171,128,0.5)}
.sidebar-footer{margin-top:auto;padding:1rem 1.25rem;border-top:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:0.6rem}
.user-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#7c5cbf,#f4732a);display:flex;align-items:center;justify-content:center;font-size:0.85rem;flex-shrink:0}
.user-name{font-size:0.78rem;color:rgba(255,255,255,0.75)}
.user-tier{font-size:0.6rem;color:#f5d58a;font-family:'DM Mono',monospace}
.main{flex:1;display:flex;flex-direction:column;position:relative;z-index:5;height:100vh;min-width:0}
.room-header{padding:1.25rem 1.75rem;background:rgba(0,0,0,0.3);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.room-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:#f5d58a}
.room-desc{font-size:0.75rem;color:rgba(255,255,255,0.4);margin-top:0.15rem}
.online-badge{font-size:0.72rem;color:#2dab80;font-family:'DM Mono',monospace;display:flex;align-items:center;gap:0.4rem}
.messages{flex:1;overflow-y:auto;padding:1.5rem 1.75rem;display:flex;flex-direction:column;gap:1rem}
.messages::-webkit-scrollbar{width:3px}
.messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg{display:flex;gap:0.75rem;align-items:flex-start;animation:msgIn 0.3s ease}
.msg.me{flex-direction:row-reverse}
.msg-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.9rem;flex-shrink:0;background:rgba(255,255,255,0.08);margin-top:2px}
.msg-body{flex:1;min-width:0}
.msg.me .msg-body{text-align:right}
.msg-meta{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.25rem;flex-wrap:wrap}
.msg.me .msg-meta{flex-direction:row-reverse}
.msg-name{font-size:0.8rem;font-weight:500;color:rgba(255,255,255,0.85)}
.msg-badge{font-size:0.58rem;padding:0.1rem 0.4rem;border-radius:100px;font-family:'DM Mono',monospace;text-transform:uppercase}
.badge-free{background:rgba(45,171,128,0.15);color:#2dab80}
.badge-silver{background:rgba(143,163,181,0.15);color:#8fa3b5}
.badge-gold{background:rgba(201,149,42,0.15);color:#c9952a}
.badge-palace{background:rgba(124,92,191,0.15);color:#a98cdf}
.msg-time{font-size:0.6rem;color:rgba(255,255,255,0.25);font-family:'DM Mono',monospace}
.msg-text{font-size:0.85rem;color:rgba(255,255,255,0.72);line-height:1.55}
.msg.me .msg-text{background:rgba(244,115,42,0.15);border-radius:12px 12px 2px 12px;display:inline-block;padding:0.5rem 0.75rem;text-align:left}
.atm-bar{padding:0.6rem 1.75rem;display:flex;align-items:center;gap:0.75rem;font-size:0.7rem;color:rgba(255,255,255,0.3);font-family:'DM Mono',monospace;border-top:1px solid rgba(255,255,255,0.04);background:rgba(0,0,0,0.2);flex-shrink:0}
.atm-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.input-area{padding:1rem 1.75rem 1.25rem;background:rgba(0,0,0,0.4);backdrop-filter:blur(10px);border-top:1px solid rgba(255,255,255,0.08);flex-shrink:0}
.input-wrap{display:flex;gap:0.75rem;align-items:center;background:rgba(255,255,255,0.06);border-radius:100px;border:1px solid rgba(255,255,255,0.1);padding:0.5rem 0.5rem 0.5rem 1.25rem;transition:border-color 0.2s}
.input-wrap:focus-within{border-color:rgba(244,115,42,0.4)}
.msg-input{flex:1;background:none;border:none;outline:none;color:rgba(255,255,255,0.85);font-size:0.875rem;font-family:'DM Sans',sans-serif;caret-color:#f4732a}
.msg-input::placeholder{color:rgba(255,255,255,0.2)}
.send-btn{width:34px;height:34px;border-radius:50%;background:#f4732a;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;color:white;font-size:14px}
.send-btn:hover{background:#ff9555;transform:scale(1.05)}
.locked-overlay{display:none;position:absolute;inset:0;z-index:20;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);align-items:center;justify-content:center}
.locked-overlay.show{display:flex}
@keyframes modalIn{from{transform:scale(0.92) translateY(12px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.lock-card{background:rgba(20,15,10,0.95);border:1px solid rgba(255,255,255,0.1);border-radius:1.5rem;padding:2.5rem 2rem;text-align:center;max-width:340px;width:90%;animation:modalIn 0.3s ease}
.lock-icon{font-size:2.5rem;margin-bottom:1rem;display:block}
.lock-title{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:#f5d58a;margin-bottom:0.5rem}
.lock-desc{font-size:0.85rem;color:rgba(255,255,255,0.5);margin-bottom:1.5rem;line-height:1.6}
.lock-btn{padding:0.7rem 1.75rem;border-radius:100px;font-size:0.875rem;font-weight:500;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all 0.2s;text-decoration:none;display:inline-block}
.lock-btn:hover{transform:translateY(-2px)}
.lock-btn-silver{background:rgba(143,163,181,0.2);color:#8fa3b5;border:1px solid rgba(143,163,181,0.3)}
.lock-btn-gold{background:linear-gradient(135deg,#c9952a,#f5d58a);color:#3a2000}
.lock-btn-palace{background:linear-gradient(135deg,#7c5cbf,#a98cdf);color:white}
.lock-dismiss{margin-top:0.75rem;font-size:0.78rem;color:rgba(255,255,255,0.3);cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif;display:block;width:100%;text-align:center}
.lock-dismiss:hover{color:rgba(255,255,255,0.6)}
/* ── TABLET (iPad) ── */

/* ── MOBILE (iPhone & Android) ── */
@media(max-width:640px){

  /* Full screen app */
  html, body { height:100%; overflow:hidden; }

    display:flex;

/* EMOJI PICKER */
.emoji-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.08);border:none;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.emoji-btn:hover{background:rgba(255,255,255,0.14);transform:scale(1.1)}
.emoji-panel{position:absolute;bottom:calc(100% + 8px);left:0;right:0;background:#1a1510;border:1px solid rgba(255,255,255,0.13);border-radius:1rem;padding:0.75rem;z-index:100;display:none;box-shadow:0 8px 32px rgba(0,0,0,0.5)}
.emoji-panel.open{display:block}
.emoji-tabs{display:flex;gap:0.3rem;margin-bottom:0.6rem;border-bottom:1px solid rgba(255,255,255,0.07);padding-bottom:0.5rem;overflow-x:auto;scrollbar-width:none}
.emoji-tabs::-webkit-scrollbar{display:none}

.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:0.25rem;max-height:180px;overflow-y:auto;scrollbar-width:thin}
.emoji-grid::-webkit-scrollbar{width:3px}
.emoji-grid::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px}
.eg-btn{background:none;border:none;cursor:pointer;font-size:1.25rem;padding:0.25rem;border-radius:0.4rem;transition:all .12s;line-height:1;aspect-ratio:1;display:flex;align-items:center;justify-content:center}

.reaction-bar{display:flex;gap:0.35rem;padding:0.4rem 1rem;flex-wrap:wrap;min-height:36px}
.react-btn{padding:0.22rem 0.6rem;border-radius:100px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);cursor:pointer;font-size:0.78rem;transition:all .15s;display:flex;align-items:center;gap:0.3rem;color:rgba(255,255,255,0.7)}

<body>
<div class="app">
  <div class="room-bg" id="roomBg"></div>
  <div id="particles"></div>
  
<!-- Mobile menu button -->
<button class="mob-menu-btn" id="mobMenuBtn" onclick="toggleMobileSidebar()" aria-label="Menu">☰</button>
<div class="sb-overlay" id="sbOverlay" onclick="toggleMobileSidebar()"></div>

<aside class="sidebar">
    <div class="sidebar-logo">Krea<span>Town</span></div>
    <div id="langToggle" style="display:flex;align-items:center;gap:0.25rem;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:100px;padding:0.18rem 0.28rem">
      <button onclick="setLang('en')" data-lang="en" style="padding:0.18rem 0.55rem;border-radius:100px;border:none;cursor:pointer;font-size:0.68rem;font-family:'DM Sans',sans-serif;background:transparent;color:rgba(255,255,255,0.45)">🇬🇧</button>
      <button onclick="setLang('tr')" data-lang="tr" style="padding:0.18rem 0.55rem;border-radius:100px;border:none;cursor:pointer;font-size:0.68rem;font-family:'DM Sans',sans-serif;background:transparent;color:rgba(255,255,255,0.45)">🇹🇷</button>
    </div>
    <div class="sidebar-back" style="display:flex;flex-direction:column;gap:0.35rem">
      <a href="feed.html" class="back-link" style="color:var(--orange)" id="feedBackLink">📰 Community Feed</a>
      <a href="javascript:history.back()" class="back-link" id="backLink">← Back</a>
    </div>
    <div class="rooms-label"><span data-i18n-en="Rooms" data-i18n-tr="Odalar">Rooms</span></div>
    <div id="roomList"></div>
    <div class="sidebar-footer">
      <div class="user-avatar" id="sidebarAv">🎨</div>
      <div><div class="user-name" id="sidebarName"><span data-i18n-en="Loading…" data-i18n-tr="Yükleniyor…">Loading…</span></div><div class="user-tier" id="sidebarTier">Member</div></div>
      <div class="online-dot" style="margin-left:auto"></div>
    </div>
  </aside>
  <main class="main">
    <div class="room-header">
      <div>
        <div class="room-title" id="roomTitle">🛎️ Hotel Lobby</div>
        <div class="room-desc" id="roomDesc">Where every story begins — open to all guests</div>
      </div>
      <div class="online-badge"><div class="online-dot"></div><span id="onlineCount">12 online</span></div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="atm-bar">
      <div class="atm-dot" id="atmDot" style="background:#f5d58a"></div>
      <span id="atmText">Warm candlelight · Soft piano · Crystal chandeliers</span>
    </div>
    <div class="input-area" style="position:relative">
      <div class="emoji-panel" id="emojiPanel">
        <div class="emoji-tabs" id="emojiTabs"></div>
        <div class="emoji-grid" id="emojiGrid"></div>
      </div>
      <div class="reaction-bar" id="reactionBar"></div>
      <div class="input-wrap">
        <button class="emoji-btn" onclick="toggleEmojiPanel()" title="Emoji">😊</button>

        <button class="send-btn" id="sendBtn">➤</button>
      </div>
    </div>
    <div class="locked-overlay" id="lockedOverlay" onclick="if(event.target===this)closeOverlay()">
      <div class="lock-card">
        <span class="lock-icon" id="lockIcon">🔒</span>
        <div class="lock-title" id="lockTitle">Members Only</div>
        <div class="lock-desc" id="lockDesc">Upgrade to access this room</div>
        <a href="checkout.html" class="lock-btn" id="lockBtn">Upgrade</a>
        <button class="lock-dismiss" onclick="closeOverlay()">Maybe later</button>
      </div>
    </div>
  </main>
</div>
<script>

async function loadMessages(roomId){
  try{
    const res = await fetch(
      SB_URL+'/rest/v1/room_messages?room_id=eq.'+roomId+'&order=created_at.asc&limit=100&select=*',
      { headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY} }
    );
    const data = await res.json();
    const room = ROOMS.find(r=>r.id===roomId);
    if(!room) return;

    /* Init tracking set */
    if(!room._knownIds) room._knownIds = new Set();
    if(!room.messages)  room.messages  = [];

    if(!Array.isArray(data) || !data.length){
      /* Only render empty state on first load */
      if(room.messages.length === 0) renderMessages(room, false);
      return;
    }

    /* Get profiles only for NEW message senders */
    const newMsgs  = data.filter(m => !room._knownIds.has(m.id));
    if(!newMsgs.length) return; /* Nothing new — don't re-render */

    const newUids  = [...new Set(newMsgs.map(m=>m.user_id).filter(Boolean))];
    let profileMap = {};

    /* Reuse cached profiles where possible */
    if(!room._profileCache) room._profileCache = {};
    const missingUids = newUids.filter(id => !room._profileCache[id]);

    if(missingUids.length){
      const pRes = await fetch(
        SB_URL+'/rest/v1/profiles?id=in.('+missingUids.join(',')+')&select=id,username,display_name,avatar_url,tier',
        { headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY} }
      );
      const profiles = await pRes.json().catch(()=>[]);
      if(Array.isArray(profiles)) profiles.forEach(p => { room._profileCache[p.id] = p; });
    }

    const session = getSession();
    const myId    = session?.user_id || session?.id;

    /* Append only new messages */
    newMsgs.forEach(m => {
      const prof = room._profileCache[m.user_id] || {};
      room._knownIds.add(m.id);
      /* Remove optimistic duplicate (matched by text + me flag) */
      room.messages = room.messages.filter(existing =>
        !(existing._optimistic && existing.text === m.content && existing.me)
      );
      room.messages.push({
        id:      m.id,
        avatar:  prof.avatar_url || '🎨',
        name:    prof.display_name || prof.username || 'Member',
        badge:   prof.tier || 'free',
        time:    timeAgo(m.created_at),
        text:    m.content,
        me:      m.user_id === myId,
        user_id: m.user_id
      });
    });

    renderMessages(room, true); /* scroll to bottom only when new msgs arrive */

  }catch(e){ console.log('Load messages error:', e); }
}

function timeAgo(ts){
  const diff=Math.floor((Date.now()-new Date(ts))/1000);
  if(diff<60)return 'just now';
  if(diff<3600)return Math.floor(diff/60)+'m';
  if(diff<86400)return Math.floor(diff/3600)+'h';
  return Math.floor(diff/86400)+'d';
}

function subscribeRoom(roomId){
  if(sbChannel){clearInterval(sbChannel);sbChannel=null;}
  // Poll every 4 seconds for new messages
  sbChannel=setInterval(()=>loadMessages(roomId),4000);
}

async function sendMessage(){
  const input=document.getElementById('msgInput');
  const text=input.value.trim();
  if(!text)return;
  
  const session=getSession();
  const profile=getMyProfile();
  const token=session?.access_token||SB_KEY;
  
  // Optimistic UI update — tagged so poll can replace it with real DB version
  const room=ROOMS.find(r=>r.id===currentRoom);
  if(!room.messages)  room.messages  = [];
  if(!room._knownIds) room._knownIds = new Set();
  room.messages.push({
    avatar:profile.avatar_url||'🎨',
    name:profile.display_name||profile.username||'You',
    badge:profile.tier||'free',
    time:'just now',
    text,
    me:true,
    _optimistic:true  /* flag: will be replaced by real DB message on next poll */
  });
  renderMessages(room);
  input.value='';
  /* Small click sound on send */
  if(typeof playSound !== 'undefined') setTimeout(()=>playSound('success'),50);
  
  // Save to Supabase
  if(session?.user_id||session?.id){
    try{
      const saveRes = await fetch(SB_URL+'/rest/v1/room_messages',{
        method:'POST',
        headers:{
          'apikey':SB_KEY,
          'Authorization':'Bearer '+token,
          'Content-Type':'application/json',
          'Prefer':'return=minimal'
        },
        body:JSON.stringify({
          room_id:currentRoom,
          user_id:session.user_id||session.id,
          content:text
        })
      });
      if(!saveRes.ok){
        const err = await saveRes.json().catch(()=>({}));
        console.error('Save failed:', saveRes.status, err);
        /* If 401 - token expired */
        if(saveRes.status===401){
          if(typeof refreshSession!=='undefined'){
            const fresh = await refreshSession();
            if(fresh){
              /* Retry with new token */
              await fetch(SB_URL+'/rest/v1/room_messages',{
                method:'POST',
                headers:{'apikey':SB_KEY,'Authorization':'Bearer '+fresh.access_token,'Content-Type':'application/json','Prefer':'return=minimal'},
                body:JSON.stringify({room_id:currentRoom,user_id:fresh.user_id||fresh.id,content:text})
              });
            }
          }
        }
      }
    }catch(e){console.log('Send error:',e);}
  }
}

function addQuickReaction(msgId, emoji){
  if(!msgReactions[msgId]) msgReactions[msgId] = {};
  msgReactions[msgId][emoji] = (msgReactions[msgId][emoji]||0) + 1;
  renderReactions(msgId);
}

function renderReactions(msgId){
  const bar = document.getElementById('reactions-'+msgId);
  if(!bar) return;
  const r = msgReactions[msgId]||{};
  bar.innerHTML = Object.entries(r).map(([e,n]) =>
    `<button class="react-btn" onclick="addQuickReaction('${msgId}','${e}')">${e} <span style="font-size:0.7rem">${n}</span></button>`
  ).join('');
}

/* Init */
document.addEventListener('DOMContentLoaded', initEmoji);


/* Quick react popup on double-tap */
const QUICK_EMOJIS = ['❤️','🔥','😂','👏','😮','😢','💯','🙌'];
function showQuickReact(msgId, e){
  /* Remove existing popup */
  document.querySelectorAll('.quick-react-popup').forEach(p=>p.remove());
  const popup = document.createElement('div');
  popup.className = 'quick-react-popup';
  popup.style.cssText = 'position:fixed;background:#1a1510;border:1px solid rgba(255,255,255,0.15);border-radius:2rem;padding:0.4rem 0.5rem;display:flex;gap:0.25rem;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,0.5)';
  popup.style.left = Math.min(e.clientX - 80, window.innerWidth - 300)+'px';
  popup.style.top  = (e.clientY - 56)+'px';
  popup.innerHTML  = QUICK_EMOJIS.map(em =>
    `<button onclick="addQuickReaction('${msgId}','${em}');this.closest('.quick-react-popup').remove()" style="background:none;border:none;cursor:pointer;font-size:1.4rem;padding:0.2rem;border-radius:50%;transition:transform .1s" onmouseover="this.style.transform='scale(1.3)'" onmouseout="this.style.transform='scale(1)'">${em}</button>`
  ).join('');
  document.body.appendChild(popup);
  setTimeout(()=>document.addEventListener('click',()=>popup.remove(),{once:true}), 50);
}


/* ── i18n: shared lang system ── */
function setLang(lang){
  try{localStorage.setItem('kt_lang',lang);}catch(e){}
  document.querySelectorAll('[data-i18n-en]').forEach(el=>{
    const v=el.getAttribute('data-i18n-'+lang);
    if(v!==null)el.innerHTML=v;
  });
  document.querySelectorAll('[data-lang]').forEach(btn=>{
    const on=btn.getAttribute('data-lang')===lang;
    btn.style.background=on?'rgba(244,115,42,0.15)':'transparent';
    btn.style.color=on?'var(--orange)':'rgba(255,255,255,0.45)';
    btn.style.fontWeight=on?'600':'400';
  });
  document.documentElement.lang=lang;
}
(function(){
  let l='en';try{l=localStorage.getItem('kt_lang')||'en';}catch(e){}
  if(l!=='tr'&&l!=='en'){const b=(navigator.language||'').toLowerCase();l=b.startsWith('tr')?'tr':'en';}
  setLang(l);
})();

/* Mobile sidebar */
function toggleMobileSidebar(){
  document.querySelector('.sb')?.classList.toggle('open');
  document.getElementById('sbOverlay')?.classList.toggle('open');
}
</script>
