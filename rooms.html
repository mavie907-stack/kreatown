<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rooms — KreaTown</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:#0a0806;color:#e8d5b0}
.app{display:flex;height:100vh;width:100%;position:relative;overflow:hidden}
.room-bg{position:absolute;inset:0;z-index:0;background-size:cover;background-position:center;background-repeat:no-repeat;transition:all 0.8s ease}
.room-bg::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,0.42)}
@keyframes particleFloat{0%{transform:translateY(100vh);opacity:0}10%{opacity:0.6}90%{opacity:0.3}100%{transform:translateY(-20px) translateX(30px);opacity:0}}
.particle{position:absolute;border-radius:50%;animation:particleFloat linear infinite;opacity:0;pointer-events:none}
#particles{position:absolute;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.sidebar{position:relative;z-index:10;width:240px;flex-shrink:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(20px);border-right:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;height:100vh}
.sidebar-logo{padding:1.5rem 1.25rem 1rem;border-bottom:1px solid rgba(255,255,255,0.08);font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:#f5d58a}
.sidebar-logo span{color:#f4732a}
.sidebar-back{padding:0.75rem 1.25rem;border-bottom:1px solid rgba(255,255,255,0.06)}
.back-link{font-size:0.75rem;color:rgba(255,255,255,0.35);text-decoration:none;display:flex;align-items:center;gap:0.4rem;transition:color 0.2s}
.back-link:hover{color:rgba(255,255,255,0.65)}
.rooms-label{padding:1rem 1.25rem 0.4rem;font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.3);font-family:'DM Mono',monospace}
.room-item{display:flex;align-items:center;gap:0.75rem;padding:0.7rem 1.25rem;cursor:pointer;border-left:2px solid transparent;transition:all 0.2s;color:rgba(255,255,255,0.5);font-size:0.82rem}
.room-item:hover{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.8)}
.room-item.active{border-left-color:#f4732a;background:rgba(244,115,42,0.1);color:#f5d58a}
.room-item.locked{opacity:0.4;cursor:not-allowed}
.room-icon{font-size:1rem;width:20px;text-align:center;flex-shrink:0}
.room-info{flex:1}
.room-name{font-size:0.82rem}
.room-tier{font-size:0.62rem;color:rgba(255,255,255,0.35);margin-top:0.1rem;font-family:'DM Mono',monospace}
.room-item.active .room-tier{color:rgba(245,213,138,0.6)}
.room-count{font-size:0.65rem;background:rgba(255,255,255,0.1);padding:0.1rem 0.4rem;border-radius:100px;color:rgba(255,255,255,0.4)}
.room-item.active .room-count{background:rgba(244,115,42,0.2);color:#f4732a}
.online-dot{width:6px;height:6px;border-radius:50%;background:#2dab80;flex-shrink:0;box-shadow:0 0 6px rgba(45,171,128,0.5)}
.sidebar-footer{margin-top:auto;padding:1rem 1.25rem;border-top:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:0.6rem}
.user-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#7c5cbf,#f4732a);display:flex;align-items:center;justify-content:center;font-size:0.85rem;flex-shrink:0}
.user-name{font-size:0.78rem;color:rgba(255,255,255,0.75)}
.user-tier{font-size:0.6rem;color:#f5d58a;font-family:'DM Mono',monospace}
.main{flex:1;display:flex;flex-direction:column;position:relative;z-index:5;height:100vh;min-width:0}
.room-header{padding:1.25rem 1.75rem;background:rgba(0,0,0,0.3);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.room-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:#f5d58a}
.room-desc{font-size:0.75rem;color:rgba(255,255,255,0.4);margin-top:0.15rem}
.online-badge{font-size:0.72rem;color:#2dab80;font-family:'DM Mono',monospace;display:flex;align-items:center;gap:0.4rem}
.messages{flex:1;overflow-y:auto;padding:1.5rem 1.75rem;display:flex;flex-direction:column;gap:1rem}
.messages::-webkit-scrollbar{width:3px}
.messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg{display:flex;gap:0.75rem;align-items:flex-start;animation:msgIn 0.3s ease}
.msg.me{flex-direction:row-reverse}
.msg-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.9rem;flex-shrink:0;background:rgba(255,255,255,0.08);margin-top:2px}
.msg-body{flex:1;min-width:0}
.msg.me .msg-body{text-align:right}
.msg-meta{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.25rem;flex-wrap:wrap}
.msg.me .msg-meta{flex-direction:row-reverse}
.msg-name{font-size:0.8rem;font-weight:500;color:rgba(255,255,255,0.85)}
.msg-badge{font-size:0.58rem;padding:0.1rem 0.4rem;border-radius:100px;font-family:'DM Mono',monospace;text-transform:uppercase}
.badge-free{background:rgba(45,171,128,0.15);color:#2dab80}
.badge-silver{background:rgba(143,163,181,0.15);color:#8fa3b5}
.badge-gold{background:rgba(201,149,42,0.15);color:#c9952a}
.badge-palace{background:rgba(124,92,191,0.15);color:#a98cdf}
.msg-time{font-size:0.6rem;color:rgba(255,255,255,0.25);font-family:'DM Mono',monospace}
.msg-text{font-size:0.85rem;color:rgba(255,255,255,0.72);line-height:1.55}
.msg.me .msg-text{background:rgba(244,115,42,0.15);border-radius:12px 12px 2px 12px;display:inline-block;padding:0.5rem 0.75rem;text-align:left}
.atm-bar{padding:0.6rem 1.75rem;display:flex;align-items:center;gap:0.75rem;font-size:0.7rem;color:rgba(255,255,255,0.3);font-family:'DM Mono',monospace;border-top:1px solid rgba(255,255,255,0.04);background:rgba(0,0,0,0.2);flex-shrink:0}
.atm-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.input-area{padding:1rem 1.75rem 1.25rem;background:rgba(0,0,0,0.4);backdrop-filter:blur(10px);border-top:1px solid rgba(255,255,255,0.08);flex-shrink:0}
.input-wrap{display:flex;gap:0.75rem;align-items:center;background:rgba(255,255,255,0.06);border-radius:100px;border:1px solid rgba(255,255,255,0.1);padding:0.5rem 0.5rem 0.5rem 1.25rem;transition:border-color 0.2s}
.input-wrap:focus-within{border-color:rgba(244,115,42,0.4)}
.msg-input{flex:1;background:none;border:none;outline:none;color:rgba(255,255,255,0.85);font-size:0.875rem;font-family:'DM Sans',sans-serif;caret-color:#f4732a}
.msg-input::placeholder{color:rgba(255,255,255,0.2)}
.send-btn{width:34px;height:34px;border-radius:50%;background:#f4732a;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;color:white;font-size:14px}
.send-btn:hover{background:#ff9555;transform:scale(1.05)}
.locked-overlay{display:none;position:absolute;inset:0;z-index:20;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);align-items:center;justify-content:center}
.locked-overlay.show{display:flex}
@keyframes modalIn{from{transform:scale(0.92) translateY(12px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.lock-card{background:rgba(20,15,10,0.95);border:1px solid rgba(255,255,255,0.1);border-radius:1.5rem;padding:2.5rem 2rem;text-align:center;max-width:340px;width:90%;animation:modalIn 0.3s ease}
.lock-icon{font-size:2.5rem;margin-bottom:1rem;display:block}
.lock-title{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:#f5d58a;margin-bottom:0.5rem}
.lock-desc{font-size:0.85rem;color:rgba(255,255,255,0.5);margin-bottom:1.5rem;line-height:1.6}
.lock-btn{padding:0.7rem 1.75rem;border-radius:100px;font-size:0.875rem;font-weight:500;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all 0.2s;text-decoration:none;display:inline-block}
.lock-btn:hover{transform:translateY(-2px)}
.lock-btn-silver{background:rgba(143,163,181,0.2);color:#8fa3b5;border:1px solid rgba(143,163,181,0.3)}
.lock-btn-gold{background:linear-gradient(135deg,#c9952a,#f5d58a);color:#3a2000}
.lock-btn-palace{background:linear-gradient(135deg,#7c5cbf,#a98cdf);color:white}
.lock-dismiss{margin-top:0.75rem;font-size:0.78rem;color:rgba(255,255,255,0.3);cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif;display:block;width:100%;text-align:center}
.lock-dismiss:hover{color:rgba(255,255,255,0.6)}
/* ── TABLET (iPad) ── */
@media(max-width:900px) and (min-width:641px){
  .sidebar{width:180px}
  .room-header{padding:0.85rem 1.25rem}
  .messages{padding:1rem 1.25rem}
  .input-area{padding:0.75rem 1.25rem}
}

/* ── MOBILE ── */
@media(max-width:640px){

  /* Odalar üstte yatay bar */
  .sidebar{
    position:fixed!important;
    top:0;left:0;right:0;bottom:auto!important;
    width:100%!important;
    height:56px!important;
    flex-direction:row;
    z-index:50;
    border-right:none;
    border-bottom:1px solid rgba(255,255,255,0.12);
    padding:0.3rem 0;
    overflow:hidden;
    background:rgba(0,0,0,0.75)!important;
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
  }
  .sidebar-back,.sidebar-footer,.sidebar-logo,.rooms-label{display:none!important}
  
  #roomList{
    display:flex!important;
    flex-direction:row;
    overflow-x:auto;
    gap:0.3rem;
    padding:0.2rem 0.75rem;
    flex:1;
    align-items:center;
    scrollbar-width:none;
    -webkit-overflow-scrolling:touch;
  }
  #roomList::-webkit-scrollbar{display:none}
  
  .room-item{
    flex-shrink:0;
    flex-direction:column;
    min-width:60px;
    padding:0.25rem 0.4rem;
    text-align:center;
    border-bottom:none!important;
    border-right:none!important;
    border-radius:0.5rem;
    align-items:center;
    gap:0.1rem;
  }
  .room-icon{font-size:1.15rem!important;line-height:1}
  .room-info{display:flex;flex-direction:column;align-items:center}
  .room-name{font-size:0.52rem!important;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:58px}
  .room-tier,.room-count{display:none!important}

  /* Main — offset top for sidebar bar */
  .main{
    position:fixed!important;
    top:56px;
    left:0;right:0;
    bottom:0;
    display:flex;
    flex-direction:column;
    z-index:10;
    overflow:hidden;
  }

  /* Room header */
  .room-header{
    padding:0.55rem 0.85rem;
    flex-shrink:0;
    background:rgba(0,0,0,0.4);
  }
  .room-title{font-size:0.88rem!important}
  .room-desc{font-size:0.6rem!important;display:none}
  .online-badge{font-size:0.62rem}

  /* Messages scroll area */
  .messages{
    flex:1;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    padding:0.75rem 0.85rem;
    gap:0.6rem;
    /* leave space for input */
    padding-bottom:0.5rem;
  }

  /* Atmosphere bar */
  .atm-bar{
    flex-shrink:0;
    padding:0.25rem 0.85rem;
    font-size:0.6rem;
  }

  /* Input — fixed at bottom */
  .input-area{
    flex-shrink:0;
    padding:0.55rem 0.75rem;
    padding-bottom:calc(0.55rem + env(safe-area-inset-bottom, 0px));
    background:rgba(0,0,0,0.65);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border-top:1px solid rgba(255,255,255,0.1);
    z-index:20;
  }
  .input-wrap{
    border-radius:1.5rem;
    padding:0.35rem 0.35rem 0.35rem 0.9rem;
    display:flex;
    align-items:center;
    gap:0.5rem;
  }
  .msg-input{
    font-size:16px!important;
  }
  .send-btn{
    width:34px!important;
    height:34px!important;
    flex-shrink:0;
  }

  /* Lock overlay */
  .locked-overlay{padding:1.5rem 1rem}
  
  /* Hide particles */
  #particles{display:none}
}
</style>

<body>

  <aside class="sidebar">
    <div class="sidebar-logo">Krea<span>Town</span></div>
    <div id="langToggle" style="display:flex;align-items:center;gap:0.25rem;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:100px;padding:0.18rem 0.28rem">
      <button onclick="setLang('en')" data-lang="en" style="padding:0.18rem 0.55rem;border-radius:100px;border:none;cursor:pointer;font-size:0.68rem;font-family:'DM Sans',sans-serif;background:transparent;color:rgba(255,255,255,0.45)">🇬🇧</button>
      <button onclick="setLang('tr')" data-lang="tr" style="padding:0.18rem 0.55rem;border-radius:100px;border:none;cursor:pointer;font-size:0.68rem;font-family:'DM Sans',sans-serif;background:transparent;color:rgba(255,255,255,0.45)">🇹🇷</button>
    </div>
    <div class="sidebar-back" style="display:flex;flex-direction:column;gap:0.35rem">
      <a href="feed.html" class="back-link" style="color:var(--orange)" id="feedBackLink">📰 Community Feed</a>
      <a href="javascript:history.back()" class="back-link" id="backLink">← Back</a>
    </div>

    <div id="roomList"></div>
    <div class="sidebar-footer">
      <div class="user-avatar" id="sidebarAv">🎨</div>

      <div class="online-badge"><div class="online-dot"></div><span id="onlineCount">12 online</span></div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="atm-bar">
      <div class="atm-dot" id="atmDot" style="background:#f5d58a"></div>

  </main>
</div>
<script>
const ROOMS=[
  {id:'lobby',icon:'🛎️',name:'Hotel Lobby',name_tr:'Otel Lobisi',tier:'free',tierLabel:'🌱 Free',tierLabel_tr:'🌱 Ücretsiz',bg:'rooms/lobby.jpg',bgPos:'center center',bgSize:'cover',atm:'Warm candlelight · Soft piano · Crystal chandeliers',atm_tr:'Sıcak mum ışığı · Hafif piyano · Kristal avizeler',atmColor:'#f5d58a',online:12,desc:'Where every story begins — open to all guests',desc_tr:'Her hikayenin başladığı yer — herkese açık',particles:['#f5d58a','#c9952a','#f4732a'],messages:[]},
  {id:'restaurant',icon:'🍽️',name:'The Restaurant',name_tr:'Restoran',tier:'silver',tierLabel:'⭐ Silver',tierLabel_tr:'⭐ Gümüş',bg:'rooms/restaurant.jpg',bgPos:'center 40%',bgSize:'cover',atm:'Golden mood lighting · Jazz quartet · Dark marble tables',atm_tr:'Altın ışık · Caz dörtlüsü · Koyu mermer masalar',atmColor:'#c9952a',online:7,desc:'Intimate conversations over fine cuisine',desc_tr:'Güzel yemekler eşliğinde samimi sohbetler',particles:['#c9952a','#8b4d00','#f5d58a'],messages:[]},
  {id:'superior',icon:'🛏️',name:'Superior Room',name_tr:'Superior Oda',tier:'gold',tierLabel:'👑 Gold',tierLabel_tr:'👑 Altın',bg:'rooms/superior.jpg',bgPos:'center center',bgSize:'contain',atm:'Ring chandelier glow · Mountain view · Warm leather',atm_tr:'Halka avize ışığı · Dağ manzarası · Sıcak deri',atmColor:'#e8d5b0',online:4,desc:'Exclusive access for Gold members',desc_tr:'Altın üyelere özel erişim',particles:['#e8d5b0','#c9952a','#ffffff'],messages:[]},

  {id:'pool',icon:'🌊',name:'Thermal Pool',name_tr:'Termal Havuz',tier:'palace',tierLabel:'🏯 Palace',tierLabel_tr:'🏯 Saray',bg:'rooms/pool.jpg',bgPos:'center 25%',bgSize:'cover',atm:'Marble columns · Golden underwater glow · Steam rising',atm_tr:'Mermer sütunlar · Altın su ışığı · Yükselen buhar',atmColor:'#4ecdc4',online:2,desc:'Palace members only — the most exclusive space',desc_tr:'Yalnızca Saray üyeleri — en özel alan',particles:['#4ecdc4','#7c5cbf','#a8edea'],messages:[]}

const TIER_ORDER=['free','silver','gold','palace']
const MY_TIER='palace'
const LOCK_CONFIG={
  silver:{icon:'⭐',
    title:'Silver Members Only', title_tr:'Yalnızca Gümüş Üyeler',
    desc:'Join the Inside the House tier to access the Restaurant.',
    desc_tr:'Restorana erişmek için Gümüş üyeliğe geç.',
    btnClass:'lock-btn-silver',
    btnText:'⭐ Upgrade to Silver · $9/mo', btnText_tr:'⭐ Gümüşe Yükselt · $9/ay'},
  gold:{icon:'👑',

}
let currentRoom='lobby'
function createParticles(colors){const c=document.getElementById('particles');c.innerHTML='';for(let i=0;i<18;i++){const p=document.createElement('div');p.className='particle';const s=Math.random()*4+2;p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${Math.random()*8+6}s;animation-delay:${Math.random()*6}s;`;c.appendChild(p)}}
function getLang(){return localStorage.getItem('kt_lang')||'en';}
function rn(r){return getLang()==='tr'&&r.name_tr?r.name_tr:r.name;}
function rtl(r){return getLang()==='tr'&&r.tierLabel_tr?r.tierLabel_tr:r.tierLabel;}
function ratm(r){return getLang()==='tr'&&r.atm_tr?r.atm_tr:r.atm;}
function rdesc(r){return getLang()==='tr'&&r.desc_tr?r.desc_tr:r.desc;}

function renderRooms(){document.getElementById('roomList').innerHTML=ROOMS.map(r=>{const locked=TIER_ORDER.indexOf(MY_TIER)<TIER_ORDER.indexOf(r.tier);const active=r.id===currentRoom;return`<div class="room-item${active?' active':''}${locked?' locked':''}" onclick="selectRoom('${r.id}')"><span class="room-icon">${r.icon}</span><div class="room-info"><div class="room-name">${rn(r)}</div><div class="room-tier">${rtl(r)}</div></div><span class="room-count">${r.online}</span>${active&&!locked?'<div class="online-dot"></div>':''}</div>`}).join('')}
function renderMessages(room, isNew=false){
  if(isNew) {
    /* Play sound - only if AudioContext is ready (user has interacted) */
    if(typeof playSound !== 'undefined' && typeof _actxReady !== 'undefined' && _actxReady) {
      playSound('message');
    }
    /* Browser notification if tab hidden */
    if(document.hidden && Notification.permission === 'granted') {
      const lastMsg = room.messages[room.messages.length-1];
      new Notification('KreaTown 💬 ' + (lastMsg?.name||'Member'), {
        body: lastMsg?.text || '',
        icon: '/manifest.json',
        silent: false
      });
    }
  }
  const c=document.getElementById('messages');
  c.innerHTML=room.messages.map(m=>{
    const isUrl = m.avatar && m.avatar.startsWith('http');
    const avatarHtml = isUrl
      ? `<img src="${m.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
      : (m.avatar||'🎨');
    const bg = m.me ? 'linear-gradient(135deg,#7c5cbf,#f4732a)' : 'rgba(255,255,255,0.08)';
    return `<div class="msg${m.me?' me':''}">
      <div class="msg-avatar" style="background:${bg}">${avatarHtml}</div>
      <div class="msg-body">
        <div class="msg-meta">
          <span class="msg-name">${m.name}</span>
          <span class="msg-badge badge-${m.badge}">${(m.badge||'free').toUpperCase()}</span>
          <span class="msg-time">${m.time}</span>
        </div>
        <div class="msg-text">${m.text}</div>
      </div>
    </div>`;
  }).join('');
  setTimeout(()=>{c.scrollTop=c.scrollHeight},100);
}
function selectRoom(id){const room=ROOMS.find(r=>r.id===id);const locked=TIER_ORDER.indexOf(MY_TIER)<TIER_ORDER.indexOf(room.tier);if(locked){const cfg=LOCK_CONFIG[room.tier];const lang=getLang();
    document.getElementById('lockIcon').textContent=cfg.icon;
    document.getElementById('lockTitle').textContent=lang==='tr'&&cfg.title_tr?cfg.title_tr:cfg.title;
    document.getElementById('lockDesc').textContent=lang==='tr'&&cfg.desc_tr?cfg.desc_tr:cfg.desc;
    const btn=document.getElementById('lockBtn');
    btn.className='lock-btn '+cfg.btnClass;
    btn.textContent=lang==='tr'&&cfg.btnText_tr?cfg.btnText_tr:cfg.btnText;document.getElementById('lockedOverlay').classList.add('show');return}currentRoom=id;const bg=document.getElementById('roomBg');bg.style.backgroundImage=`url('${room.bg}')`;bg.style.backgroundPosition=room.bgPos||'center center';bg.style.backgroundSize=room.bgSize||'cover';document.getElementById('roomTitle').textContent=room.icon+' '+rn(room);
    document.getElementById('roomDesc').textContent=rdesc(room);
    document.getElementById('onlineCount').textContent=room.online+' '+(getLang()==='tr'?'çevrimiçi':'online');
    document.getElementById('atmText').textContent=ratm(room);document.getElementById('atmDot').style.background=room.atmColor;document.getElementById('msgInput').placeholder=getLang()==='tr'?rn(room).toLowerCase()+' odasında bir şey yaz…':'Say something in '+room.name.toLowerCase()+'...';
  document.getElementById('lockedOverlay').classList.remove('show');
  renderRooms();
  createParticles(room.particles);
  /* Show loading state */
  const msgEl=document.getElementById('messages');
  if(msgEl)msgEl.innerHTML='<div style="padding:2rem;text-align:center;color:rgba(255,255,255,0.25);font-size:0.8rem">Loading messages…</div>';
  loadMessages(id);
  subscribeRoom(id);
}

async function loadMessages(roomId){
  try{
    /* Step 1: Get messages for this room */
    const res = await fetch(
      SB_URL+'/rest/v1/room_messages?room_id=eq.'+roomId+'&order=created_at.asc&limit=100&select=*',
      { headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY} }
    );
    const data = await res.json();
    if(!Array.isArray(data) || !data.length){
      const room = ROOMS.find(r=>r.id===roomId);
      if(room){ room.messages=[]; renderMessages(room, false); }
      return;
    }

    /* Step 2: Get profiles for message senders */
    const userIds = [...new Set(data.map(m=>m.user_id).filter(Boolean))];
    let profileMap = {};
    if(userIds.length){
      const pRes = await fetch(
        SB_URL+'/rest/v1/profiles?id=in.('+userIds.join(',')+')&select=id,username,display_name,avatar_url,tier',
        { headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY} }
      );
      const profiles = await pRes.json().catch(()=>[]);
      if(Array.isArray(profiles)) profiles.forEach(p => profileMap[p.id] = p);
    }

    const room    = ROOMS.find(r=>r.id===roomId);
    const session = getSession();
    const myId    = session?.user_id || session?.id;

    room.messages = data.map(m => {
      const prof = profileMap[m.user_id] || {};
      return {
        id:     m.id,
        avatar: prof.avatar_url || '🎨',
        name:   prof.display_name || prof.username || 'Member',
        badge:  prof.tier || 'free',
        time:   timeAgo(m.created_at),
        text:   m.content,
        me:     m.user_id === myId,
        user_id:m.user_id
      };
    });

    const prevCount = room._msgCount || 0;
    const newCount  = room.messages.length;
    renderMessages(room, newCount > prevCount);
    room._msgCount = newCount;

  }catch(e){ console.log('Load messages error:', e); }
}

function timeAgo(ts){
  const diff=Math.floor((Date.now()-new Date(ts))/1000);
  if(diff<60)return 'just now';
  if(diff<3600)return Math.floor(diff/60)+'m';
  if(diff<86400)return Math.floor(diff/3600)+'h';
  return Math.floor(diff/86400)+'d';
}

function subscribeRoom(roomId){
  if(sbChannel){clearInterval(sbChannel);sbChannel=null;}
  // Poll every 4 seconds for new messages
  sbChannel=setInterval(()=>loadMessages(roomId),4000);
}

async function sendMessage(){
  const input=document.getElementById('msgInput');
  const text=input.value.trim();
  if(!text)return;
  
  const session=getSession();
  const profile=getMyProfile();
  const token=session?.access_token||SB_KEY;
  
  // Optimistic UI update
  const room=ROOMS.find(r=>r.id===currentRoom);
  room.messages.push({
    avatar:profile.avatar_url||'🎨', /* URL or emoji */
    name:profile.display_name||profile.username||'You',
    badge:profile.tier||'free',
    time:'just now',
    text,
    me:true
  });
  renderMessages(room);
  input.value='';
  /* Small click sound on send */
  if(typeof playSound !== 'undefined') setTimeout(()=>playSound('success'),50);
  
  // Save to Supabase
  if(session?.user_id||session?.id){
    try{
      const saveRes = await fetch(SB_URL+'/rest/v1/room_messages',{
        method:'POST',
        headers:{
          'apikey':SB_KEY,
          'Authorization':'Bearer '+token,
          'Content-Type':'application/json',
          'Prefer':'return=minimal'
        },
        body:JSON.stringify({
          room_id:currentRoom,
          user_id:session.user_id||session.id,
          content:text
        })
      });
      if(!saveRes.ok){
        const err = await saveRes.json().catch(()=>({}));
        console.error('Save failed:', saveRes.status, err);
        /* If 401 - token expired */
        if(saveRes.status===401){
          if(typeof refreshSession!=='undefined'){
            const fresh = await refreshSession();
            if(fresh){
              /* Retry with new token */
              await fetch(SB_URL+'/rest/v1/room_messages',{
                method:'POST',
                headers:{'apikey':SB_KEY,'Authorization':'Bearer '+fresh.access_token,'Content-Type':'application/json','Prefer':'return=minimal'},
                body:JSON.stringify({room_id:currentRoom,user_id:fresh.user_id||fresh.id,content:text})
              });
            }
          }
        }
      }
    }catch(e){console.log('Send error:',e);}
  }
}

/* ── iOS/MOBILE KEYBOARD FIX ── */
(function(){
  const inp  = document.getElementById('msgInput');
  const msgs = document.getElementById('messages');
  if(!inp) return;

  /* Scroll messages to bottom when input focused */
  inp.addEventListener('focus', ()=>{
    setTimeout(()=>{
      if(msgs) msgs.scrollTop = msgs.scrollHeight;
    }, 300);
  });

  /* Visual Viewport API — handles keyboard resize on iOS */
  if(window.visualViewport){
    window.visualViewport.addEventListener('resize', ()=>{
      if(msgs) msgs.scrollTop = msgs.scrollHeight;
    });
  }
})();
